<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis PAES 2026</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #ffffff;
    --text: #2d3436;
    --light-text: #636e72;
    --invierno: #ff7675;
    --regular: #0984e3;
    --ui-border: #dfe6e9;
  }

  body {
    background-color: #f9f9f9;
    color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif; 
    padding: 2rem;
    line-height: 1.6;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  h1 { font-weight: 700; font-size: 1.8rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
  .subtitle { color: var(--light-text); margin-bottom: 2rem; }

  .toggle-container {
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }
  .btn-toggle {
    padding: 10px 20px;
    border: 1px solid var(--ui-border);
    background: white;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
  }
  .btn-toggle.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }

  .chart-area { position: relative; height: 400px; margin-top: 2rem; }
  
  #tooltip {
    position: absolute;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 10;
  }

  .legend { display: flex; gap: 20px; margin-bottom: 1rem; font-size: 0.9rem; font-weight: 600; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }

  svg { overflow: visible; width: 100%; height: 100%; }
  rect { transition: height 0.5s ease-in-out, y 0.5s ease-in-out; cursor: pointer; }
  rect:hover { opacity: 0.8; }
</style>
</head>
<body>

<div class="container">
  <h1 id="mainTitle">Rendimiento en Matemática 1</h1>
  <p class="subtitle">Comparación de distribución porcentual entre procesos de admisión.</p>

  <div class="toggle-container">
    <button class="btn-toggle active" onclick="updateChart('mate')">Matemática 1</button>
    <button class="btn-toggle" onclick="updateChart('clec')">Comprensión Lectora</button>
  </div>

  <div class="legend">
    <span><span class="dot" style="background: var(--invierno);"></span>PAES Invierno</span>
    <span><span class="dot" style="background: var(--regular);"></span>PAES Regular</span>
  </div>

  <div class="chart-area">
    <div id="tooltip"></div>
    <svg id="chartSvg"></svg>
  </div>
</div>

<script>
const DATA = {
  mate: {
    title: "Rendimiento en Matemática 1",
    inv: [0.0, 0.0, 0.7, 9.5, 21.4, 21.7, 19.6, 13.5, 13.6],
    reg: [0.0, 0.0, 1.6, 16.1, 30.3, 24.7, 12.4, 7.7, 7.2]
  },
  clec: {
    title: "Rendimiento en Comprensión Lectora",
    inv: [0.0, 0.0, 1.1, 8.3, 20.9, 27.6, 26.1, 14.3, 1.6],
    reg: [0.0, 0.1, 3.7, 17.8, 31.2, 26.4, 15.2, 6.8, 0.8]
  }
};

const LABELS = ["100–199", "200–299", "300–399", "400–499", "500–599", "600–699", "700–799", "800–899", "900–1000"];
const svg = document.getElementById('chartSvg');
const tooltip = document.getElementById('tooltip');

function updateChart(subject) {
  document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('mainTitle').innerText = DATA[subject].title;

  const w = svg.clientWidth;
  const h = 400;
  const padding = 40;
  const chartH = h - padding * 2;
  const barW = (w / LABELS.length) * 0.35;
  const maxVal = 35;

  let html = '';

  for (let i = 0; i <= 35; i += 5) {
    const y = h - padding - (i / maxVal) * chartH;
    html += `<line x1="${padding}" y1="${y}" x2="${w}" y2="${y}" stroke="#eee" />`;
    html += `<text x="${padding - 10}" y="${y + 4}" text-anchor="end" font-size="12" fill="#999">${i}%</text>`;
  }

  LABELS.forEach((label, i) => {
    const xBase = padding + (i * (w - padding) / LABELS.length) + (w - padding) / (LABELS.length * 2);
    
    const valInv = DATA[subject].inv[i];
    const valReg = DATA[subject].reg[i];

    const hInv = (valInv / maxVal) * chartH;
    const hReg = (valReg / maxVal) * chartH;

    html += `<rect x="${xBase - barW - 2}" y="${h - padding - hInv}" width="${barW}" height="${hInv}" fill="#ff7675" rx="4" 
              onmouseover="showTooltip(event, '${label}', 'Invierno', ${valInv})" onmouseout="hideTooltip()"/>`;
    
    html += `<rect x="${xBase + 2}" y="${h - padding - hReg}" width="${barW}" height="${hReg}" fill="#0984e3" rx="4"
              onmouseover="showTooltip(event, '${label}', 'Regular', ${valReg})" onmouseout="hideTooltip()"/>`;

    html += `<text x="${xBase}" y="${h - 10}" text-anchor="middle" font-size="11" fill="#636e72">${label}</text>`;
  });

  svg.innerHTML = html;
}

function showTooltip(e, label, type, val) {
  tooltip.style.display = 'block';
  tooltip.style.left = (e.pageX + 10) + 'px';
  tooltip.style.top = (e.pageY - 40) + 'px';
  tooltip.innerHTML = `<strong>${label}</strong><br>${type}: ${val}%`;
}

function hideTooltip() { tooltip.style.display = 'none'; }

window.onload = () => updateChart('mate');
window.onresize = () => updateChart(document.querySelector('.btn-toggle.active').innerText.includes('Matemática') ? 'mate' : 'clec');

</script>
</body>
</html>
